# =============================================================================
# rnaseq-deseq2-wgcna — pipeline configuration
# -----------------------------------------------------------------------------
# Single source of truth for paths, dataset, thresholds, and WGCNA parameters.
# To analyse a different cancer or dataset, edit this file only — no script
# in workflow/scripts/ should contain a hard-coded path, accession, or cutoff.
# =============================================================================

project:
  name: rnaseq-deseq2-wgcna
  cancer: "Breast invasive carcinoma"
  cancer_short: "BRCA"
  organism: "Homo sapiens"
  genome_build: "GRCh38 / GENCODE v26 (recount3 uniform reprocessing)"

# -----------------------------------------------------------------------------
# Dataset
# -----------------------------------------------------------------------------
# Entry point is a counts matrix. We pull TCGA-BRCA counts via recount3
# (Bioconductor), which delivers a uniformly reprocessed RangedSummarizedExperiment.
# A FASTQ → counts upstream stage is out of scope for v1.0 (see README roadmap).
dataset:
  source: "recount3"            # one of: recount3 | geo | local
  project: "BRCA"               # recount3 project / GDC accession
  project_home: "data_sources/tcga"
  organism: "human"

  # When source == "geo", these are used instead:
  geo_accession: null           # e.g. "GSE37764"
  geo_counts_url: null

  # Grouping variable in the sample metadata that defines the contrast.
  # For TCGA recount3 this is derived from tcga.cgc_sample_sample_type.
  condition_column: "condition"
  reference_level: "normal"     # baseline group in the DESeq2 contrast
  treatment_level: "tumor"      # group of interest

# -----------------------------------------------------------------------------
# Paths — all relative to the repo root
# -----------------------------------------------------------------------------
paths:
  # Inputs
  raw_counts: "data/counts.tsv"
  sample_metadata: "data/samples.tsv"

  # Demo subset for CI (committed; tiny so CI stays under a minute)
  demo_counts: "data/demo/counts.tsv"
  demo_metadata: "data/demo/samples.tsv"

  # Intermediate artefacts
  rds_dir: "results/rds"
  dds_rds: "results/rds/dds.rds"
  vsd_rds: "results/rds/vsd.rds"
  de_results_rds: "results/rds/de_results.rds"
  wgcna_rds: "results/rds/wgcna.rds"

  # Deliverable tables (committed under results/example/tables/ for the canonical run)
  tables_dir: "results/tables"
  de_results_csv: "results/tables/de_results.tsv"
  module_assignments_csv: "results/tables/module_assignments.tsv"
  hub_genes_csv: "results/tables/hub_genes.tsv"
  enrichment_go_csv: "results/tables/enrichment_go.tsv"
  enrichment_kegg_csv: "results/tables/enrichment_kegg.tsv"
  gsea_go_csv: "results/tables/gsea_go.tsv"
  gsea_kegg_csv: "results/tables/gsea_kegg.tsv"

  # Figures
  figures_dir: "results/figures"

  # Report
  report_qmd: "report/report.qmd"
  report_html: "docs/index.html"

# -----------------------------------------------------------------------------
# Pre-filtering — gene-level filters applied in 01_load_and_qc.R
# -----------------------------------------------------------------------------
prefilter:
  protein_coding_only: true     # keep only gene_type == "protein_coding"
                                # (drops snoRNA / lncRNA / pseudogenes / RNU* etc.)
  min_cpm: 1                    # keep gene if CPM >= min_cpm
  min_samples: 3                # in >= min_samples samples

# -----------------------------------------------------------------------------
# Sample-level QC — applied in 01_load_and_qc.R
# -----------------------------------------------------------------------------
qc:
  min_library_size: 5000000     # samples below this get lib_size_low=TRUE in samples.tsv
  metastatic: "drop"            # TCGA Metastatic handling: drop | tumor | separate
  dedupe_aliquots: true         # keep one aliquot per (patient_id, condition)

# -----------------------------------------------------------------------------
# Differential expression (DESeq2)
# -----------------------------------------------------------------------------
deseq2:
  padj_threshold: 0.05          # adjusted p-value cutoff for "significant"
  log2fc_threshold: 1.0         # absolute log2 fold change cutoff
  shrink_method: "apeglm"       # lfcShrink type: apeglm | ashr | normal
  independent_filtering: true
  top_n_heatmap: 50             # number of top DE genes shown in the heatmap

# -----------------------------------------------------------------------------
# WGCNA — co-expression network parameters
# -----------------------------------------------------------------------------
# These have a large effect on module count and biological interpretability.
# Defaults match WGCNA tutorial best practice for a tumor-vs-normal RNA-seq
# study; revisit soft_power after inspecting the scale-free topology fit plot.
wgcna:
  tumor_only: true              # build the network on treatment-level samples only;
                                # otherwise modules just recapitulate tumor-vs-normal
  sample_cut_height: null       # numeric cutoff for sample-tree outlier removal;
                                # null = skip cut, just emit wgcna_sample_tree.png
                                # for inspection. Tune per dataset, then set.
  n_top_genes: 5000             # keep the top-N genes by variance (deterministic
                                # regardless of input size). Tutorial range 3-5k;
                                # higher values inflate the grey/unassigned bin.
  soft_power: 6                 # soft-thresholding power; null = use pickSoftThreshold's
                                # powerEstimate. 6 typical for unsigned, 12 for signed.
  scale_free_r2_min: 0.80       # warn loudly if scale-free fit R^2 at the chosen power
                                # falls below this — network is likely noise-dominated
  network_type: "unsigned"      # unsigned | signed | signed hybrid
  tom_type: "unsigned"          # must start with "signed" if network_type is signed
  min_module_size: 30           # minimum genes per module
  merge_cut_height: 0.25        # modules with eigengene correlation > (1 - this) are merged
  deep_split: 2                 # 0-4; higher = more, smaller modules
  pam_respects_dendro: false
  exclude_grey_in_hub: true     # grey is the unassigned bin — exclude from hub nomination
  hub_gene_top_n: 10            # number of hub genes reported per trait-correlated module
  kme_threshold: 0.8            # module membership cutoff for "hub" candidacy

# -----------------------------------------------------------------------------
# Clinical traits — pulled from recount3 colData in 01_load_and_qc.R, used as
# the module-trait design in 03_wgcna.R (replaces the tumor/normal axis once
# wgcna.tumor_only is on).
# -----------------------------------------------------------------------------
traits:
  # short_name (column written to samples.tsv) -> recount3 colData column
  recount3_columns:
    ER_status:             "tcga.xml_breast_carcinoma_estrogen_receptor_status"
    PR_status:             "tcga.xml_breast_carcinoma_progesterone_receptor_status"
    HER2_status:           "tcga.xml_lab_proc_her2_neu_immunohistochemistry_receptor_status"
    stage:                 "tcga.cgc_case_pathologic_stage"
    age_at_diagnosis:      "tcga.cgc_case_age_at_diagnosis"
    vital_status:          "tcga.xml_vital_status"
    days_to_death:         "tcga.cgc_case_days_to_death"
    days_to_last_followup: "tcga.cgc_case_days_to_last_followup"
  # Subset of the above used in the WGCNA module-trait heatmap. Add any
  # numeric/categorical samples.tsv column here; multi-level categoricals are
  # one-hot expanded automatically.
  module_trait_columns:
    - ER_status
    - PR_status
    - HER2_status
    - stage
    - age_at_diagnosis
    - lib_size

# -----------------------------------------------------------------------------
# Enrichment (clusterProfiler)
# -----------------------------------------------------------------------------
enrichment:
  org_db: "org.Hs.eg.db"
  keytype: "ENTREZID"            # must be ENTREZID — script asserts this
  go_ontology: "BP"              # BP | MF | CC | ALL (ALL runs all three)
  kegg_organism: "hsa"
  pvalue_cutoff: 0.05
  qvalue_cutoff: 0.10
  min_gs_size: 10                # gene-set member-count floor (clusterProfiler param)
  max_gs_size: 500
  min_input_genes: 10            # skip a run if the input gene list is smaller than this
                                 # (conceptually distinct from min_gs_size)
  top_n_dotplot: 15              # categories to plot per dotplot

# -----------------------------------------------------------------------------
# Runtime
# -----------------------------------------------------------------------------
runtime:
  seed: 42                      # for set.seed() across the pipeline
  threads: 4                    # passed to WGCNAnThreads() and DESeq2 parallel
  log_level: "INFO"             # DEBUG | INFO | WARN | ERROR
